<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>크로스 플랫폼 칸반 보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="kanban.css">
</head>
<body>

    <!-- 헤더 -->
    <div class="header">
        <h1>🚀 나의 칸반 보드</h1>
        <div class="header-actions">
            <!-- 데이터 불러오기 파일 인풋 (숨김) -->
            <input type="file" id="import-file" accept=".json" style="display:none;" onchange="importData(event)">
            <button class="btn" onclick="document.getElementById('import-file').click()" title="데이터 불러오기">📂 불러오기</button>
            <button class="btn" onclick="exportData()" title="데이터 내보내기">💾 내보내기</button>
            <button class="btn" onclick="clearAllDone()" title="완료된 작업 정리">🧹 정리</button>
        </div>
    </div>

    <!-- 작업 추가 패널 -->
    <div class="add-panel">
        <button class="add-toggle" id="add-toggle" onclick="toggleAddForm()">＋ 새 작업 추가...</button>
        <div class="add-form" id="add-form">
            <div class="form-row">
                <label class="form-label">작업명</label>
                <input type="text" class="form-input" id="new-task-input" placeholder="무엇을 해야 하나요?">
            </div>
            <div class="form-row">
                <label class="form-label">중요도</label>
                <div class="priority-pills" id="priority-pills">
                    <button class="priority-pill" data-p="high" onclick="selectPriority('high')">🔴 높음</button>
                    <button class="priority-pill active" data-p="medium" onclick="selectPriority('medium')">🟡 보통</button>
                    <button class="priority-pill" data-p="low" onclick="selectPriority('low')">🟢 낮음</button>
                </div>
            </div>
            <div class="form-row">
                <label class="form-label">시급성</label>
                <div class="urgency-pills" id="urgency-pills">
                    <button class="urgency-pill" data-u="urgent" onclick="selectUrgency('urgent')">🔥 시급</button>
                    <button class="urgency-pill active" data-u="normal" onclick="selectUrgency('normal')">⏳ 여유</button>
                </div>
            </div>
            <div class="form-row">
                <label class="form-label">카테고리</label>
                <input type="text" class="form-input" id="category-input" placeholder="예: 개발, 디자인, 마케팅..." list="category-list" style="min-width:140px;">
                <datalist id="category-list"></datalist>
            </div>
            <div class="form-row">
                <label class="form-label">상위 작업</label>
                <select class="form-select" id="parent-select">
                    <option value="">없음 (최상위)</option>
                </select>
            </div>
            <div class="form-row" style="justify-content: flex-end; gap: 8px;">
                <button class="btn" onclick="toggleAddForm()">취소</button>
                <button class="btn btn-primary" onclick="addTask()">✚ 작업 추가</button>
            </div>
        </div>
    </div>

    <!-- 필터 바 -->
    <div class="filter-bar" id="filter-bar">
        <span class="filter-label">필터</span>
        <button class="filter-chip active" data-filter="priority" data-value="all" onclick="setFilter('priority','all')">전체</button>
        <button class="filter-chip" data-filter="priority" data-value="high" onclick="setFilter('priority','high')">🔴 높음</button>
        <button class="filter-chip" data-filter="priority" data-value="medium" onclick="setFilter('priority','medium')">🟡 보통</button>
        <button class="filter-chip" data-filter="priority" data-value="low" onclick="setFilter('priority','low')">🟢 낮음</button>
        <div class="filter-divider"></div>
        <span class="filter-label">시급성</span>
        <button class="filter-chip active" data-filter="urgency" data-value="all" onclick="setFilter('urgency','all')">전체</button>
        <button class="filter-chip" data-filter="urgency" data-value="urgent" onclick="setFilter('urgency','urgent')">🔥 시급</button>
        <button class="filter-chip" data-filter="urgency" data-value="normal" onclick="setFilter('urgency','normal')">⏳ 여유</button>
        <div class="filter-divider"></div>
        <span class="filter-label">카테고리</span>
        <button class="filter-chip active" data-filter="category" data-value="all" onclick="setFilter('category','all')">전체</button>
        <span id="category-filters"></span>
    </div>

    <!-- 보드 -->
    <div class="board">
        <div class="column" id="col-todo">
            <div class="column-header">
                <div class="column-dot"></div>
                <span class="column-title">할 일</span>
                <span class="column-count" id="count-todo">0</span>
            </div>
            <div class="task-list" id="list-todo"></div>
        </div>
        <div class="column" id="col-doing">
            <div class="column-header">
                <div class="column-dot"></div>
                <span class="column-title">진행 중</span>
                <span class="column-count" id="count-doing">0</span>
            </div>
            <div class="task-list" id="list-doing"></div>
        </div>
        <div class="column" id="col-done">
            <div class="column-header">
                <div class="column-dot"></div>
                <span class="column-title">완료</span>
                <span class="column-count" id="count-done">0</span>
            </div>
            <div class="task-list" id="list-done"></div>
        </div>
    </div>

    <script src="kanban.js"></script>

</body>
</html>
